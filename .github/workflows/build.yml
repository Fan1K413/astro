name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: 🏗️ 构建
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v5

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: 📦 安装 pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: 📚 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 🏗️ 构建 Astro
        run: pnpm build

      - name: 📤 上传构建产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: 🚀 部署
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 发布到 Pages
        uses: actions/deploy-pages@v4
